extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  resource/nextcrm:
    attributes:
      - key: service.name
        value: ${env:OTEL_SERVICE_NAME:-nextcrm-app}
        action: insert
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-local}
        action: insert
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  extensions:
    - health_check
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - debug
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - debug
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - otlphttp/loki

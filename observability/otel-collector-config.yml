extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  file_storage:
    directory: /var/lib/otelcol/file_storage
    create_directory: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog/nextcrm:
    include:
      - /var/log/nextcrm/*.log
    include_file_name: true
    include_file_path: true
    start_at: beginning
    storage: file_storage
    operators:
      - id: parse_pino_json
        type: json_parser
        parse_from: body
        parse_to: attributes
        on_error: send
      - id: promote_pino_message
        type: move
        from: attributes.message
        to: body
        if: 'attributes.message != nil'

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  resource/nextcrm:
    attributes:
      - key: service.name
        value: ${env:OTEL_SERVICE_NAME:-nextcrm-app}
        action: insert
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-local}
        action: insert
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  extensions:
    - health_check
    - file_storage
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - debug
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - debug
    logs:
      receivers:
        - otlp
        - filelog/nextcrm
      processors:
        - memory_limiter
        - resource/nextcrm
        - batch
      exporters:
        - otlphttp/loki
